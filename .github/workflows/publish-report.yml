name: Public LINE Report

on:
  workflow_dispatch:
  schedule:
    # 10:40 Taiwan time (UTC+8)
    - cron: "40 2 * * *"
  push:
    paths:
      - trigger-report.txt

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Generate public report page
        run: |
          set -euo pipefail
          mkdir -p public
          report_time="$(TZ=Asia/Taipei date +'%Y-%m-%d %H:%M')"
          cat > public/index.html <<HTML
          <!doctype html>
          <html lang="zh-Hant">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Daily Investment Watch</title>
            <style>
              body { margin: 0; background: #f6f7f9; color: #1f2328; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
              main { max-width: 920px; margin: 0 auto; padding: 28px 16px 44px; }
              h1 { font-size: 28px; line-height: 1.2; margin: 0 0 12px; }
              h2 { font-size: 20px; margin: 28px 0 12px; border-bottom: 1px solid #d8dee4; padding-bottom: 6px; }
              p, li { font-size: 16px; line-height: 1.58; }
              table { width: 100%; border-collapse: collapse; margin: 12px 0 24px; background: #fff; }
              th, td { border: 1px solid #d8dee4; padding: 8px 10px; text-align: left; font-size: 14px; }
              th { background: #eef1f4; }
              tr:nth-child(even) td { background: #fafbfc; }
              .note { color: #57606a; font-size: 13px; margin-top: 24px; }
              @media (max-width: 720px) { main { padding: 20px 12px 36px; } table { display: block; overflow-x: auto; } h1 { font-size: 24px; } }
            </style>
          </head>
          <body>
          <main>
          <h1>Daily Investment Watch / 每日投資觀察</h1>
          <p><strong>Date:</strong> ${report_time} Taipei</p>
          <p>For Irene: conservative, income-aware, US/Taiwan cross-border lens.<br>給 Irene：保守、重視現金流，並納入美國/台灣跨境生活角度。</p>
          <h2>Executive take / 今日重點</h2>
          <ul>
          <li>Keep liquidity first: cash-like instruments before aggressive equity buying.</li>
          <li>先保留流動性：現金停泊工具優先，不急著大筆追股票。</li>
          <li>Broad ETFs can be staged slowly; AI/semis should stay a small, volatile sleeve.</li>
          <li>大盤 ETF 可分批；AI/半導體只適合小比例、高波動部位。</li>
          <li>This is monitoring, not licensed financial/tax/legal advice.</li>
          <li>本訊息為監控資訊，不是正式投資、稅務或法律建議。</li>
          </ul>
          <h2>Watchlist / 觀察清單</h2>
          <table>
          <tr><th>Group</th><th>Tickers</th><th>Stance</th></tr>
          <tr><td>Cash / 現金停泊</td><td>SGOV, BIL, SHV</td><td>Prefer liquidity first / 優先流動性</td></tr>
          <tr><td>Core ETFs / 核心 ETF</td><td>VTI, VOO, VT, SCHD</td><td>Add slowly / 分批慢慢加</td></tr>
          <tr><td>AI & Semis / AI 與半導體</td><td>NVDA, AVGO, AMD, TSM, ASML</td><td>Small volatile sleeve; avoid chasing / 小比例高波動，避免追高</td></tr>
          <tr><td>Large-cap quality / 大型股</td><td>MSFT, GOOGL, AMZN, AAPL, V</td><td>Watch valuation and cash need / 注意估值與現金需求</td></tr>
          </table>
          <h2>Practical checklist / 實務檢查</h2>
          <ol>
          <li>Keep 12-24 months of living needs liquid.</li>
          <li>If deploying USD: SGOV/BIL first, then VTI/VOO/SCHD slowly.</li>
          <li>Avoid one-shot buying in semiconductors after strong rallies.</li>
          </ol>
          <p>中文：保留 12-24 個月生活費流動性；美元配置先 SGOV/BIL，再分批 VTI/VOO/SCHD；半導體大漲後避免一次性追高。</p>
          <p class="note">Generated by GitHub Actions. This public page contains report text only, no secrets.</p>
          </main>
          </body>
          </html>
          HTML
          
          cat > line-message.txt <<MSG
          Daily Investment Watch generated by GitHub Actions
          Date: ${report_time} Taipei
          
          Open report (no GitHub login needed):
          https://hpyuan1220.github.io/line-report-public/
          MSG

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy public report page
        uses: actions/deploy-pages@v4

      - name: Push LINE message
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TEST_USER_ID: ${{ secrets.LINE_TEST_USER_ID }}
        run: |
          set -euo pipefail
          python3 - <<'PY' > payload.json
          import json
          import os
          from pathlib import Path
          payload = {
              "to": os.environ["LINE_TEST_USER_ID"],
              "messages": [{"type": "text", "text": Path("line-message.txt").read_text(encoding="utf-8")}],
          }
          print(json.dumps(payload, ensure_ascii=False))
          PY
          curl --fail-with-body -sS -X POST https://api.line.me/v2/bot/message/push \
            -H "Authorization: Bearer ${LINE_CHANNEL_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            --data @payload.json
