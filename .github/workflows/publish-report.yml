name: Public LINE Report

on:
  workflow_dispatch:
  schedule:
    # 10:40 Taiwan time (UTC+8)
    - cron: "40 2 * * *"
  push:
    paths:
      - trigger-report.txt
      - .github/workflows/publish-report.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Generate data-only market dashboard
        run: |
          set -euo pipefail
          mkdir -p public
          python3 - <<'PY'
          import csv
          import datetime as dt
          import html
          import os
          import urllib.request
          from io import StringIO
          from pathlib import Path
          from zoneinfo import ZoneInfo

          NOW = dt.datetime.now(ZoneInfo("Asia/Taipei"))
          PUBLIC_BASE = "https://hpyuan1220.github.io/line-report-public"
          CACHE_TAG = os.environ.get("GITHUB_RUN_ID", NOW.strftime("%Y%m%d%H%M"))

          WATCH = [
              ("S&P 500 ETF", "spy.us", "US core equity proxy"),
              ("Nasdaq 100 ETF", "qqq.us", "Growth / technology proxy"),
              ("Semiconductor ETF", "smh.us", "AI and semiconductor risk watch"),
              ("Total US Market", "vti.us", "Broad US equity"),
              ("S&P 500 Core", "voo.us", "Core US equity"),
              ("Dividend Equity", "schd.us", "Income quality watch"),
              ("Short Treasury", "sgov.us", "Cash parking watch"),
              ("US Aggregate Bond", "bnd.us", "Bond ETF watch"),
              ("Nvidia", "nvda.us", "AI infrastructure bellwether"),
              ("TSMC ADR", "tsm.us", "Taiwan semiconductor bellwether"),
          ]

          MACRO = [
              ("Fed Funds Effective Rate", "DFF"),
              ("US 10Y Treasury Yield", "DGS10"),
              ("US 2Y Treasury Yield", "DGS2"),
              ("Unemployment Rate", "UNRATE"),
              ("Nonfarm Payrolls", "PAYEMS"),
              ("CPI Index", "CPIAUCSL"),
              ("PCE Price Index", "PCEPI"),
          ]

          def get_stooq(symbol):
              url = f"https://stooq.com/q/l/?s={symbol}&f=sd2t2ohlcv&h&e=csv"
              try:
                  with urllib.request.urlopen(url, timeout=20) as r:
                      rows = list(csv.DictReader(StringIO(r.read().decode("utf-8"))))
                  if not rows or rows[0].get("Close") in (None, "N/D"):
                      return None
                  row = rows[0]
                  return {"date": row.get("Date", ""), "close": row.get("Close", ""), "change": "", "volume": row.get("Volume", "")}
              except Exception:
                  return None

          def get_fred(series):
              url = f"https://fred.stlouisfed.org/graph/fredgraph.csv?id={series}"
              try:
                  with urllib.request.urlopen(url, timeout=20) as r:
                      text = r.read().decode("utf-8")
                  rows = list(csv.reader(StringIO(text)))
                  for date, value in reversed(rows[1:]):
                      if value and value != ".":
                          return date, value
              except Exception:
                  pass
              return "Data feed pending", "Data feed pending"

          def row(cells):
              return "<tr>" + "".join(f"<td>{html.escape(str(c))}</td>" for c in cells) + "</tr>"

          market_rows = []
          for name, symbol, note in WATCH:
              data = get_stooq(symbol)
              if data:
                  market_rows.append(row([name, symbol.upper(), data["date"], data["close"], data["volume"], note]))
              else:
                  market_rows.append(row([name, symbol.upper(), "Data feed pending", "Data feed pending", "", note]))

          macro_rows = []
          for name, series in MACRO:
              date, value = get_fred(series)
              macro_rows.append(row([name, series, date, value]))

          notes = [
              "This is data-only, no AI analysis and no personalized investment advice.",
              "Prices are intended as latest available close data from public data feeds.",
              "Irene decides independently; this dashboard is for watchlist and risk monitoring only.",
          ]

          page = f"""<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Irene Market Dashboard</title><style>body{{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;background:#f6f7f9;color:#1f2328;margin:0}}main{{max-width:1050px;margin:0 auto;padding:24px 14px 44px}}h1{{font-size:28px}}h2{{font-size:20px;margin-top:28px;border-bottom:1px solid #d8dee4;padding-bottom:6px}}p,li{{line-height:1.55}}table{{width:100%;border-collapse:collapse;background:#fff;margin:12px 0 24px}}th,td{{border:1px solid #d8dee4;padding:8px 9px;text-align:left;font-size:14px}}th{{background:#eef1f4}}tr:nth-child(even) td{{background:#fafbfc}}.note{{background:#fff;border:1px solid #d8dee4;border-radius:8px;padding:12px}}@media(max-width:760px){{main{{padding:18px 10px 36px}}table{{display:block;overflow-x:auto}}h1{{font-size:24px}}}}</style></head><body><main><h1>Irene Daily Market Dashboard</h1><p><strong>Generated:</strong> {NOW:%Y-%m-%d %H:%M} Taipei</p><div class="note"><p><strong>Sample mode:</strong> data dashboard without OpenAI API. LINE delivers this link; email can later include the full table.</p></div><h2>Market Close Watch / 收盤價格觀察</h2><table><thead><tr><th>Name</th><th>Symbol</th><th>Latest Date</th><th>Last Close</th><th>Volume</th><th>Watch Point</th></tr></thead><tbody>{''.join(market_rows)}</tbody></table><h2>Macro Watch / 宏觀數字觀察</h2><table><thead><tr><th>Metric</th><th>Series</th><th>Latest Date</th><th>Latest Value</th></tr></thead><tbody>{''.join(macro_rows)}</tbody></table><h2>Rule-Based Watch Notes / 固定規則提醒</h2><ul>{''.join(f'<li>{html.escape(n)}</li>' for n in notes)}</ul><p>This page is for monitoring only, not financial/tax/legal advice.</p></main></body></html>"""
          Path("public/index.html").write_text(page, encoding="utf-8")
          Path("public/investment.html").write_text(page, encoding="utf-8")
          Path("public/ai-startup.html").write_text("<!doctype html><html><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width, initial-scale=1\"><title>AI Startup Watch</title></head><body><main><h1>AI Startup Watch</h1><p>Data-only market sample sent first. AI startup news deck will be added after confirming delivery format.</p></main></body></html>", encoding="utf-8")
          Path("line-message.txt").write_text(f"Irene Daily Market Dashboard\n{NOW:%Y-%m-%d %H:%M} Taipei\n\nData-only sample report is ready. No OpenAI API used.\n\nOpen report:\n{PUBLIC_BASE}/?v={CACHE_TAG}", encoding="utf-8")
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy public report page
        uses: actions/deploy-pages@v4

      - name: Push LINE message
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TEST_USER_ID: ${{ secrets.LINE_TEST_USER_ID }}
        run: |
          set -euo pipefail
          python3 - <<'PY' > payload.json
          import json
          import os
          from pathlib import Path
          payload = {
              "to": os.environ["LINE_TEST_USER_ID"],
              "messages": [{"type": "text", "text": Path("line-message.txt").read_text(encoding="utf-8")}],
          }
          print(json.dumps(payload, ensure_ascii=False))
          PY
          curl --fail-with-body -sS -X POST https://api.line.me/v2/bot/message/push \
            -H "Authorization: Bearer ${LINE_CHANNEL_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            --data @payload.json
