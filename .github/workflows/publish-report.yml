name: Public LINE Report

on:
  workflow_dispatch:
  schedule:
    # 10:40 Taiwan time (UTC+8)
    - cron: "40 2 * * *"
  push:
    paths:
      - trigger-report.txt
      - .github/workflows/publish-report.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Schwab watchlist market dashboard
        run: |
          set -euo pipefail
          mkdir -p public
          python3 - <<'PY'
          import csv
          import datetime as dt
          import html
          import json
          import os
          import urllib.request
          from io import StringIO
          from pathlib import Path
          from zoneinfo import ZoneInfo

          NOW = dt.datetime.now(ZoneInfo("Asia/Taipei"))
          PUBLIC_BASE = "https://hpyuan1220.github.io/line-report-public"
          CACHE_TAG = os.environ.get("GITHUB_RUN_ID", NOW.strftime("%Y%m%d%H%M"))

          WATCH_GROUPS = {
              "Irene AI Stock / Irene AI 股票": [
                  ("MSFT", "Microsoft / 企業 AI 與雲端"),
                  ("NVDA", "Nvidia / AI GPU 與基礎建設"),
                  ("AVGO", "Broadcom / AI networking 與晶片"),
                  ("GOOGL", "Google / AI search 與雲端"),
                  ("AMZN", "Amazon / AWS 與 AI infrastructure"),
                  ("AAPL", "Apple / 消費科技與 AI device"),
                  ("TSM", "TSMC ADR / 半導體製造"),
                  ("ASML", "ASML / 半導體設備"),
                  ("AMD", "AMD / AI GPU 競爭"),
                  ("V", "Visa / 支付網路與消費觀察"),
              ],
              "Irene Core ETF / Irene 核心 ETF": [
                  ("VTI", "美股整體市場"),
                  ("VOO", "S&P 500 核心配置"),
                  ("VT", "全球股票配置"),
                  ("VXUS", "美國以外股票"),
                  ("SCHD", "股息品質"),
                  ("QUAL", "品質因子 ETF"),
                  ("SGOV", "短債/現金停泊"),
                  ("BIL", "短期 T-Bill"),
                  ("SMH", "半導體主題"),
                  ("SOXX", "半導體主題"),
              ],
              "Irene Short income / Irene 短期收益": [
                  ("SGOV", "0-3 月短債/現金停泊"),
                  ("BIL", "1-3 月 T-Bill"),
                  ("SHV", "短期 Treasury ETF"),
                  ("VGSH", "Vanguard 短期 Treasury"),
                  ("SHY", "1-3 年 Treasury"),
                  ("VTIP", "短期抗通膨債"),
                  ("BND", "美國總體債券"),
                  ("AGG", "美國總體債券"),
                  ("VCIT", "中期公司債"),
                  ("TIP", "抗通膨債券"),
              ],
          }

          OSCAR_LIST = [
              (1, "IREN", 56.00, 58.00),
              (2, "CLSK", 15.50, 16.50),
              (3, "APLD", 42.00, 44.00),
              (4, "RIOT", 25.00, 26.00),
              (5, "SHAZ", 62.00, 65.00),
              (6, "TE", 8.50, 9.50),
          ]

          MACRO = [
              ("聯邦基金有效利率", "Fed Funds Effective Rate", "DFF"),
              ("美國 10 年公債殖利率", "US 10Y Treasury Yield", "DGS10"),
              ("美國 2 年公債殖利率", "US 2Y Treasury Yield", "DGS2"),
              ("失業率", "Unemployment Rate", "UNRATE"),
              ("非農就業人數", "Nonfarm Payrolls", "PAYEMS"),
              ("CPI 消費者物價指數", "CPI Index", "CPIAUCSL"),
              ("PCE 物價指數", "PCE Price Index", "PCEPI"),
          ]

          def yahoo_quote(symbol):
              url = f"https://query1.finance.yahoo.com/v8/finance/chart/{symbol}?range=10d&interval=1d"
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
                  with urllib.request.urlopen(req, timeout=25) as r:
                      data = json.loads(r.read().decode("utf-8"))
                  result = data["chart"]["result"][0]
                  currency = result.get("meta", {}).get("currency", "USD")
                  timestamps = result.get("timestamp", [])
                  quote = result["indicators"]["quote"][0]
                  closes = quote.get("close", [])
                  volumes = quote.get("volume", [])
                  pairs = []
                  for i, close in enumerate(closes):
                      if close is not None and i < len(timestamps):
                          date = dt.datetime.fromtimestamp(timestamps[i], ZoneInfo("America/New_York")).date().isoformat()
                          vol = volumes[i] if i < len(volumes) and volumes[i] is not None else ""
                          pairs.append((date, float(close), vol))
                  if not pairs:
                      return None
                  date, close, vol = pairs[-1]
                  change = ""
                  if len(pairs) >= 2:
                      prev = pairs[-2][1]
                      if prev:
                          change = f"{((close - prev) / prev) * 100:.2f}%"
                  return {"date": date, "close": f"{close:.2f}", "change": change, "volume": vol, "currency": currency}
              except Exception:
                  return None

          def fred_latest(series):
              url = f"https://fred.stlouisfed.org/graph/fredgraph.csv?id={series}"
              try:
                  with urllib.request.urlopen(url, timeout=25) as r:
                      rows = list(csv.reader(StringIO(r.read().decode("utf-8"))))
                  for date, value in reversed(rows[1:]):
                      if value and value != ".":
                          return date, value
              except Exception:
                  pass
              return "資料源暫缺", "資料源暫缺"

          def td(value):
              return f"<td>{html.escape(str(value))}</td>"

          def tr(cells):
              return "<tr>" + "".join(td(c) for c in cells) + "</tr>"

          def quote_row(symbol, note):
              q = yahoo_quote(symbol)
              if q:
                  return tr([symbol, q["date"], q["currency"], q["close"], q["change"], q["volume"], note])
              return tr([symbol, "資料源暫缺", "USD", "資料源暫缺", "", "", note])

          def watch_group_html(title, items):
              rows = "".join(quote_row(symbol, note) for symbol, note in items)
              return f"<h2>{html.escape(title)}</h2><table><thead><tr><th>代號</th><th>最新日期</th><th>幣別</th><th>收盤價</th><th>日變動</th><th>成交量</th><th>觀察重點</th></tr></thead><tbody>{rows}</tbody></table>"

          def oscar_status(close, low, high):
              if close is None:
                  return "資料暫缺"
              if close < low:
                  return "低於 Oscar 區間"
              if close > high:
                  return "高於 Oscar 區間"
              return "在 Oscar 區間內"

          def oscar_rows():
              rows = []
              for rank, symbol, low, high in OSCAR_LIST:
                  q = yahoo_quote(symbol)
                  range_text = "$" + format(low, ".2f") + " - $" + format(high, ".2f")
                  if q:
                      try:
                          close = float(q["close"])
                      except Exception:
                          close = None
                      rows.append(tr([rank, symbol, range_text, q["date"], q["currency"], q["close"], q["change"], oscar_status(close, low, high)]))
                  else:
                      rows.append(tr([rank, symbol, range_text, "資料源暫缺", "USD", "資料源暫缺", "", "資料暫缺，請確認 ticker 是否正確"]))
              return "".join(rows)

          macro_rows = []
          for zh, en, series in MACRO:
              date, value = fred_latest(series)
              macro_rows.append(tr([zh, en, series, date, value]))

          group_sections = "".join(watch_group_html(title, items) for title, items in WATCH_GROUPS.items())
          rules = [
              "Schwab watchlist 只保存股票代號與清單名稱，不保存帳戶號碼或持倉數量。",
              "這是 data-only 報告：不使用 OpenAI API、不產生 AI 投資建議。",
              "價格欄位以公開資料源的最新可得收盤價為主，通常是上一個美股交易日。",
              "宏觀數字使用 FRED 公開資料；CPI、PCE、非農、失業率不是每日更新，會顯示最新公布月份。",
              "此報告只做 watchlist 與風險監控，不是財務、稅務或法律建議；是否買賣由 Irene 自己決定。",
          ]

          page = f"""<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Irene 每日市場儀表板</title><style>body{{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;background:#f6f7f9;color:#1f2328;margin:0}}main{{max-width:1120px;margin:0 auto;padding:24px 14px 44px}}h1{{font-size:28px}}h2{{font-size:20px;margin-top:28px;border-bottom:1px solid #d8dee4;padding-bottom:6px}}p,li{{line-height:1.58}}table{{width:100%;border-collapse:collapse;background:#fff;margin:12px 0 24px}}th,td{{border:1px solid #d8dee4;padding:8px 9px;text-align:left;font-size:14px}}th{{background:#eef1f4}}tr:nth-child(even) td{{background:#fafbfc}}.note{{background:#fff;border:1px solid #d8dee4;border-radius:8px;padding:12px}}@media(max-width:760px){{main{{padding:18px 10px 36px}}table{{display:block;overflow-x:auto}}h1{{font-size:24px}}}}</style></head><body><main><h1>Irene 每日市場儀表板</h1><p><strong>產生時間：</strong>{NOW:%Y-%m-%d %H:%M} 台北時間</p><div class="note"><p><strong>資料來源：</strong>Schwab 自訂 watchlist 代號 + 公開市場收盤價 + FRED 宏觀數字。不使用 OpenAI API。</p></div>{group_sections}<h2>Oscar Watch List / Oscar 建議價位觀察</h2><p>來源：Irene 朋友 Oscar 提供。這是觀察清單，不是自動買賣建議。</p><table><thead><tr><th>順序</th><th>股票代號</th><th>Oscar 建議價位區間</th><th>最新日期</th><th>幣別</th><th>最新收盤價</th><th>日變動</th><th>狀態</th></tr></thead><tbody>{oscar_rows()}</tbody></table><h2>宏觀數字觀察 / Macro Watch</h2><table><thead><tr><th>中文指標</th><th>英文指標</th><th>資料代號</th><th>最新日期</th><th>最新數值</th></tr></thead><tbody>{''.join(macro_rows)}</tbody></table><h2>固定規則提醒 / Rule-Based Notes</h2><ul>{''.join(f'<li>{html.escape(r)}</li>' for r in rules)}</ul></main></body></html>"""
          Path("public/index.html").write_text(page, encoding="utf-8")
          Path("public/investment.html").write_text(page, encoding="utf-8")
          Path("public/ai-startup.html").write_text("<!doctype html><html lang=\"zh-Hant\"><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width, initial-scale=1\"><title>AI 創業觀察</title></head><body><main><h1>AI 創業觀察</h1><p>目前先保存 Schwab watchlist 到 data-only 市場儀表板。AI startup 新聞資料源可下一步加入。</p></main></body></html>", encoding="utf-8")
          Path("line-message.txt").write_text(f"Irene 每日市場儀表板\n{NOW:%Y-%m-%d %H:%M} 台北時間\n\n已加入 Schwab 自訂 watchlist：AI Stock、Core ETF、Short income、Oscar。\n不使用 OpenAI API。\n\n打開報告：\n{PUBLIC_BASE}/?v={CACHE_TAG}", encoding="utf-8")
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy public report page
        uses: actions/deploy-pages@v4

      - name: Push LINE message
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TEST_USER_ID: ${{ secrets.LINE_TEST_USER_ID }}
        run: |
          set -euo pipefail
          python3 - <<'PY' > payload.json
          import json
          import os
          from pathlib import Path
          payload = {
              "to": os.environ["LINE_TEST_USER_ID"],
              "messages": [{"type": "text", "text": Path("line-message.txt").read_text(encoding="utf-8")}],
          }
          print(json.dumps(payload, ensure_ascii=False))
          PY
          curl --fail-with-body -sS -X POST https://api.line.me/v2/bot/message/push \
            -H "Authorization: Bearer ${LINE_CHANNEL_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            --data @payload.json
