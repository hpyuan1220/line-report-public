name: Public LINE Report

on:
  workflow_dispatch:
  schedule:
    # 10:40 Taiwan time (UTC+8)
    - cron: "40 2 * * *"
  push:
    paths:
      - trigger-report.txt
      - .github/workflows/publish-report.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Schwab watchlist market dashboard
        run: |
          set -euo pipefail
          mkdir -p public
          python3 - <<'PY'
          import csv
          import datetime as dt
          import html
          import json
          import os
          import urllib.request
          from io import StringIO
          from pathlib import Path
          from zoneinfo import ZoneInfo

          NOW = dt.datetime.now(ZoneInfo("Asia/Taipei"))
          PUBLIC_BASE = "https://hpyuan1220.github.io/line-report-public"
          CACHE_TAG = os.environ.get("GITHUB_RUN_ID", NOW.strftime("%Y%m%d%H%M"))

          WATCH_GROUPS = {
              "Irene AI Stock / Irene AI 股票": [
                  ("MSFT", "Microsoft / 企業 AI 與雲端"),
                  ("NVDA", "Nvidia / AI GPU 與基礎建設"),
                  ("AVGO", "Broadcom / AI networking 與晶片"),
                  ("GOOGL", "Google / AI search 與雲端"),
                  ("AMZN", "Amazon / AWS 與 AI infrastructure"),
                  ("AAPL", "Apple / 消費科技與 AI device"),
                  ("TSM", "TSMC ADR / 半導體製造"),
                  ("ASML", "ASML / 半導體設備"),
                  ("AMD", "AMD / AI GPU 競爭"),
                  ("V", "Visa / 支付網路與消費觀察"),
              ],
              "Irene Core ETF / Irene 核心 ETF": [
                  ("VTI", "美股整體市場"),
                  ("VOO", "S&P 500 核心配置"),
                  ("VT", "全球股票配置"),
                  ("VXUS", "美國以外股票"),
                  ("SCHD", "股息品質"),
                  ("QUAL", "品質因子 ETF"),
                  ("SGOV", "短債/現金停泊"),
                  ("BIL", "短期 T-Bill"),
                  ("SMH", "半導體主題"),
                  ("SOXX", "半導體主題"),
              ],
              "Irene Short income / Irene 短期收益": [
                  ("SGOV", "0-3 月短債/現金停泊"),
                  ("BIL", "1-3 月 T-Bill"),
                  ("SHV", "短期 Treasury ETF"),
                  ("VGSH", "Vanguard 短期 Treasury"),
                  ("SHY", "1-3 年 Treasury"),
                  ("VTIP", "短期抗通膨債"),
                  ("BND", "美國總體債券"),
                  ("AGG", "美國總體債券"),
                  ("VCIT", "中期公司債"),
                  ("TIP", "抗通膨債券"),
              ],
          }

          OSCAR_LIST = [
              (1, "IREN", 56.00, 58.00),
              (2, "CLSK", 15.50, 16.50),
              (3, "APLD", 42.00, 44.00),
              (4, "RIOT", 25.00, 26.00),
              (5, "SHAZ", 62.00, 65.00),
              (6, "TE", 8.50, 9.50),
          ]

          MACRO = [
              ("聯邦基金有效利率", "Fed Funds Effective Rate", "DFF", "lower_good"),
              ("美國 10 年公債殖利率", "US 10Y Treasury Yield", "DGS10", "lower_good"),
              ("美國 2 年公債殖利率", "US 2Y Treasury Yield", "DGS2", "lower_good"),
              ("失業率", "Unemployment Rate", "UNRATE", "lower_good"),
              ("非農就業人數", "Nonfarm Payrolls", "PAYEMS", "higher_good"),
              ("CPI 消費者物價指數", "CPI Index", "CPIAUCSL", "lower_good"),
              ("PCE 物價指數", "PCE Price Index", "PCEPI", "lower_good"),
          ]

          def yahoo_quote(symbol):
              url = f"https://query1.finance.yahoo.com/v8/finance/chart/{symbol}?range=10d&interval=1d"
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
                  with urllib.request.urlopen(req, timeout=25) as r:
                      data = json.loads(r.read().decode("utf-8"))
                  result = data["chart"]["result"][0]
                  currency = result.get("meta", {}).get("currency", "USD")
                  timestamps = result.get("timestamp", [])
                  quote = result["indicators"]["quote"][0]
                  closes = quote.get("close", [])
                  volumes = quote.get("volume", [])
                  pairs = []
                  for i, close in enumerate(closes):
                      if close is not None and i < len(timestamps):
                          date = dt.datetime.fromtimestamp(timestamps[i], ZoneInfo("America/New_York")).date().isoformat()
                          vol = volumes[i] if i < len(volumes) and volumes[i] is not None else ""
                          pairs.append((date, float(close), vol))
                  if not pairs:
                      return None
                  date, close, vol = pairs[-1]
                  change = ""
                  if len(pairs) >= 2:
                      prev = pairs[-2][1]
                      if prev:
                          change = f"{((close - prev) / prev) * 100:.2f}%"
                  return {"date": date, "close": f"{close:.2f}", "change": change, "volume": vol, "currency": currency}
              except Exception:
                  return None

          def fred_points(series):
              url = f"https://fred.stlouisfed.org/graph/fredgraph.csv?id={series}"
              try:
                  with urllib.request.urlopen(url, timeout=25) as r:
                      rows = list(csv.reader(StringIO(r.read().decode("utf-8"))))
                  points = []
                  for date, value in rows[1:]:
                      if value and value != ".":
                          try:
                              points.append((date, float(value)))
                          except Exception:
                              pass
                  return points
              except Exception:
                  return []

          def macro_status(change, direction):
              if change is None:
                  return "資料暫缺", "flat"
              if abs(change) < 1e-12:
                  return "持平", "flat"
              is_good = change > 0 if direction == "higher_good" else change < 0
              if is_good:
                  return "較前值改善", "up"
              return "較前值轉弱", "down"

          def macro_row(zh, en, series, direction):
              points = fred_points(series)
              if not points:
                  return tr([zh, en, series, "資料源暫缺", "資料源暫缺", "資料源暫缺", "", ("資料暫缺", "flat")])
              latest_date, latest_value = points[-1]
              if len(points) >= 2:
                  prev_date, prev_value = points[-2]
                  change = latest_value - prev_value
                  change_text = f"{change:+.3f}"
                  status, cls = macro_status(change, direction)
                  return tr([zh, en, series, latest_date, f"{latest_value:g}", f"{prev_value:g} ({prev_date})", (change_text, cls), (status, cls)])
              return tr([zh, en, series, latest_date, f"{latest_value:g}", "無前值", "", ("無法比較", "flat")])

          def change_class(value):
              text = str(value).strip().replace("%", "")
              try:
                  number = float(text)
              except Exception:
                  return "flat"
              if number > 0:
                  return "up"
              if number < 0:
                  return "down"
              return "flat"

          def td(value, css_class=""):
              cls = f' class="{css_class}"' if css_class else ""
              return f"<td{cls}>{html.escape(str(value))}</td>"

          def tr(cells):
              out = []
              for cell in cells:
                  if isinstance(cell, tuple):
                      out.append(td(cell[0], cell[1]))
                  else:
                      out.append(td(cell))
              return "<tr>" + "".join(out) + "</tr>"

          def quote_row(symbol, note):
              q = yahoo_quote(symbol)
              if q:
                  return tr([symbol, q["date"], q["currency"], q["close"], (q["change"], change_class(q["change"])), q["volume"], note])
              return tr([symbol, "資料源暫缺", "USD", "資料源暫缺", "", "", note])

          def watch_group_html(title, items):
              rows = "".join(quote_row(symbol, note) for symbol, note in items)
              return f"<h2>{html.escape(title)}</h2><table><thead><tr><th>代號</th><th>最新日期</th><th>幣別</th><th>收盤價</th><th>日變動</th><th>成交量</th><th>觀察重點</th></tr></thead><tbody>{rows}</tbody></table>"

          def oscar_status(close, low, high):
              if close is None:
                  return "資料暫缺"
              if close < low:
                  return "低於 Oscar 區間"
              if close > high:
                  return "高於 Oscar 區間"
              return "在 Oscar 區間內"

          def oscar_rows():
              rows = []
              for rank, symbol, low, high in OSCAR_LIST:
                  q = yahoo_quote(symbol)
                  range_text = "$" + format(low, ".2f") + " - $" + format(high, ".2f")
                  if q:
                      try:
                          close = float(q["close"])
                      except Exception:
                          close = None
                      rows.append(tr([rank, symbol, range_text, q["date"], q["currency"], q["close"], (q["change"], change_class(q["change"])), oscar_status(close, low, high)]))
                  else:
                      rows.append(tr([rank, symbol, range_text, "資料源暫缺", "USD", "資料源暫缺", "", "資料暫缺，請確認 ticker 是否正確"]))
              return "".join(rows)

          macro_rows = []
          for zh, en, series, direction in MACRO:
              macro_rows.append(macro_row(zh, en, series, direction))

          group_sections = "".join(watch_group_html(title, items) for title, items in WATCH_GROUPS.items())
          rules = [
              "Schwab watchlist 只保存股票代號與清單名稱，不保存帳戶號碼或持倉數量。",
              "這是 data-only 報告：不使用 OpenAI API、不產生 AI 投資建議。",
              "價格欄位以公開資料源的最新可得收盤價為主，通常是上一個美股交易日。",
              "宏觀數字使用 FRED 公開資料；會比較最新公布值與前一筆公布值，利率/通膨/失業率下降偏綠，非農上升偏綠。",
              "此報告只做 watchlist 與風險監控，不是財務、稅務或法律建議；是否買賣由 Irene 自己決定。",
          ]

          page = f"""<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Irene 每日市場儀表板</title><style>body{{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;background:#f6f7f9;color:#1f2328;margin:0}}main{{max-width:1120px;margin:0 auto;padding:24px 14px 44px}}h1{{font-size:28px}}h2{{font-size:20px;margin-top:28px;border-bottom:1px solid #d8dee4;padding-bottom:6px}}p,li{{line-height:1.58}}table{{width:100%;border-collapse:collapse;background:#fff;margin:12px 0 24px}}th,td{{border:1px solid #d8dee4;padding:8px 9px;text-align:left;font-size:14px}}th{{background:#eef1f4}}tr:nth-child(even) td{{background:#fafbfc}}.note{{background:#fff;border:1px solid #d8dee4;border-radius:8px;padding:12px}}.up{{color:#137333;font-weight:700}}.down{{color:#c5221f;font-weight:700}}.flat{{color:#57606a;font-weight:600}}@media(max-width:760px){{main{{padding:18px 10px 36px}}table{{display:block;overflow-x:auto}}h1{{font-size:24px}}}}</style></head><body><main><h1>Irene 每日市場儀表板</h1><p><strong>產生時間：</strong>{NOW:%Y-%m-%d %H:%M} 台北時間</p><div class="note"><p><strong>資料來源：</strong>Schwab 自訂 watchlist 代號 + 公開市場收盤價 + FRED 宏觀數字。不使用 OpenAI API。</p></div>{group_sections}<h2>Oscar Watch List / Oscar 建議價位觀察</h2><p>來源：Irene 朋友 Oscar 提供。這是觀察清單，不是自動買賣建議。</p><table><thead><tr><th>順序</th><th>股票代號</th><th>Oscar 建議價位區間</th><th>最新日期</th><th>幣別</th><th>最新收盤價</th><th>日變動</th><th>狀態</th></tr></thead><tbody>{oscar_rows()}</tbody></table><h2>宏觀數字觀察 / Macro Watch</h2><table><thead><tr><th>中文指標</th><th>英文指標</th><th>資料代號</th><th>最新日期</th><th>最新數值</th><th>前值</th><th>變化</th><th>狀態</th></tr></thead><tbody>{''.join(macro_rows)}</tbody></table><h2>固定規則提醒 / Rule-Based Notes</h2><ul>{''.join(f'<li>{html.escape(r)}</li>' for r in rules)}</ul></main></body></html>"""

          cash_page = f"""<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Irene 現金行動計畫</title><style>body{{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;margin:0;background:#f6f7f9;color:#1f2328}}main{{max-width:980px;margin:0 auto;padding:20px}}h1{{font-size:28px;margin:12px 0}}h2{{font-size:20px;margin-top:28px;border-bottom:1px solid #d0d7de;padding-bottom:8px}}.note{{background:#fff;border:1px solid #d0d7de;border-radius:8px;padding:14px;margin:14px 0}}.warn{{background:#fff8c5;border-color:#d4a72c}}table{{border-collapse:collapse;width:100%;background:#fff;margin:12px 0}}th,td{{border:1px solid #d0d7de;padding:8px;text-align:left;vertical-align:top}}th{{background:#f0f2f5}}.green{{color:#137333;font-weight:700}}.red{{color:#c5221f;font-weight:700}}.small{{color:#57606a;font-size:14px}}ul{{background:#fff;border:1px solid #d0d7de;border-radius:8px;padding:14px 22px}}li{{margin:8px 0}}code{{background:#eef1f4;padding:2px 4px;border-radius:4px}}@media(max-width:720px){{main{{padding:14px}}table{{font-size:13px;display:block;overflow-x:auto}}h1{{font-size:24px}}}}</style></head><body><main><p class="small">{NOW:%Y-%m-%d %H:%M} 台北時間</p><h1>Irene 現金行動計畫：Monday 與 June</h1><div class="note warn"><strong>界線：</strong>這是 professional-style 投資工作台筆記，不是持牌投資、稅務或法律建議。Irene 保留最後決策權，重大跨美台配置應與合格顧問確認。</div><h2>核心結論</h2><div class="note"><p>Monday 和 June 的目標是 <strong>開始有紀律的分批流程</strong>，不是一次完成全部投資。Irene 61 歲、沒有固定薪水、資產跨美台，第一優先是流動性，第二是讓閒置現金產生收益，第三才是分批建立 ETF 部位。</p></div><h2>US Cash: USD 290,000</h2><table><thead><tr><th>Bucket</th><th>金額</th><th>角色</th></tr></thead><tbody><tr><td>AI startup reserve</td><td>USD 100,000</td><td>不要承擔股市風險</td></tr><tr><td>安全與機會現金</td><td>USD 60,000-80,000</td><td>生活、醫療、稅務、旅居、機會資金</td></tr><tr><td>2026 分批投資池</td><td>USD 100,000-120,000</td><td>逐步投入短債 ETF 與核心 ETF</td></tr></tbody></table><h2>Monday 2026-06-22 美股開盤行動</h2><p>美股 9:30 PM 台北時間開盤。不要開盤立刻追價，等 30-60 分鐘，用 limit order。</p><table><thead><tr><th>可能動作</th><th>金額</th><th>工具</th><th>目的</th></tr></thead><tbody><tr><td>現金停泊</td><td>USD 15,000-20,000</td><td>SGOV / BIL</td><td>開始取得短債收益</td></tr><tr><td>美股核心</td><td>USD 8,000-12,000</td><td>VTI 或 VOO</td><td>第一批 broad market entry</td></tr><tr><td>品質 / 股息</td><td>USD 3,000-5,000</td><td>SCHD 或 QUAL</td><td>穩健 equity balance</td></tr><tr><td>AI / 半導體</td><td>USD 0-3,000</td><td>SMH / SOXX / NVDA / AVGO</td><td>只有拉回才小額，不追高</td></tr></tbody></table><p><strong>Monday 最大部署：</strong>約 USD 20,000-35,000。</p><h2>Taiwan Cash: NTD 20,000,000</h2><table><thead><tr><th>Bucket</th><th>金額</th><th>角色</th></tr></thead><tbody><tr><td>台灣生活與安全現金</td><td>NTD 6M-8M</td><td>生活、醫療、房貸、家庭、稅務、流動性</td></tr><tr><td>既有債券型基金</td><td>NTD 7M</td><td>先檢查，不因帳面負值急賣</td></tr><tr><td>台股 ETF 分批預算</td><td>NTD 3M</td><td>0050 / 0043A 分批，不一次投入</td></tr><tr><td>彈性資金</td><td>剩餘現金</td><td>匯率機會、市場修正、未來 business needs</td></tr></tbody></table><h2>June 台灣動作</h2><table><thead><tr><th>動作</th><th>金額</th><th>目的</th></tr></thead><tbody><tr><td>台股 ETF 第一批</td><td>NTD 300K-500K</td><td>只建立起始部位</td></tr><tr><td>保留後續批次</td><td>NTD 2.5M-2.7M</td><td>之後幾週或拉回再分批</td></tr><tr><td>債券基金檢查</td><td>不強迫交易</td><td>看費用率、duration、配息來源、本金侵蝕</td></tr></tbody></table><h2>June Rules</h2><ul><li>每週最多一批。</li><li>正常日或弱勢日加，不追大漲日。</li><li>美股或台股跌 2-3% 時，可考慮第二批。</li><li>市場連續大漲時，只做 SGOV/BIL 或等。</li><li>USD 100K startup reserve 分開，不拿來做市場交易。</li><li>不要同時大幅移動美金、台幣、債券基金、ETF 四個部位。</li></ul><h2>What Not To Do</h2><ul><li class="red">不要一次投入全部 USD 290K。</li><li class="red">不要動用 startup reserve 做股票交易。</li><li class="red">不要在 NVDA / SMH / SOXX 大漲日追高。</li><li>不要只因債券基金帳面價格負就急賣，先確認 income 與 break-even。</li><li>不要買不了解費用、duration、信用、匯率與本金風險的高收益產品。</li></ul><h2>下單後回報格式</h2><div class="note"><p><code>Update Irene investment profile:</code><br>Date:<br>Action:<br>Account:<br>Ticker / fund:<br>Amount:<br>Approx price:<br>Reason:<br>Remaining cash:</p></div><p class="small">相關每日市場儀表板：<a href="{PUBLIC_BASE}/?v={CACHE_TAG}">{PUBLIC_BASE}/?v={CACHE_TAG}</a></p></main></body></html>"""

          Path("public/index.html").write_text(page, encoding="utf-8")
          Path("public/investment.html").write_text(page, encoding="utf-8")
          Path("public/ai-startup.html").write_text("<!doctype html><html lang=\"zh-Hant\"><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width, initial-scale=1\"><title>AI 創業觀察</title></head><body><main><h1>AI 創業觀察</h1><p>目前先保存 Schwab watchlist 到 data-only 市場儀表板。AI startup 新聞資料源可下一步加入。</p></main></body></html>", encoding="utf-8")
          Path("public/cash-action-plan.html").write_text(cash_page, encoding="utf-8")
          Path("line-message.txt").write_text(f"Irene 今日投資報告 / 現金行動計畫\n{NOW:%Y-%m-%d %H:%M} 台北時間\n\n已保存 Monday / June US cash 與 Taiwan cash 分批計畫。\n\n現金行動計畫：\n{PUBLIC_BASE}/cash-action-plan.html?v={CACHE_TAG}\n\n每日市場儀表板：\n{PUBLIC_BASE}/?v={CACHE_TAG}", encoding="utf-8")
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy public report page
        uses: actions/deploy-pages@v4

      - name: Push LINE message
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TEST_USER_ID: ${{ secrets.LINE_TEST_USER_ID }}
        run: |
          set -euo pipefail
          python3 - <<'PY' > payload.json
          import json
          import os
          from pathlib import Path
          payload = {
              "to": os.environ["LINE_TEST_USER_ID"],
              "messages": [{"type": "text", "text": Path("line-message.txt").read_text(encoding="utf-8")}],
          }
          print(json.dumps(payload, ensure_ascii=False))
          PY
          curl --fail-with-body -sS -X POST https://api.line.me/v2/bot/message/push \
            -H "Authorization: Bearer ${LINE_CHANNEL_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            --data @payload.json
